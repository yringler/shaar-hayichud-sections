<div class="xml-output">
  <div class="output-actions">
    <wa-button size="small" appearance="outlined" (click)="onLoadFileClick()" title="Load XML file">
      <wa-icon name="folder-open" slot="start"></wa-icon>
      Load File
    </wa-button>
    <app-xml-library-picker (fileSelected)="loadRequest.emit($event)" />
    <wa-button size="small" appearance="outlined" (click)="onCopy()" [disabled]="!jsonContent()" title="Copy XML to clipboard">
      <wa-icon name="copy" slot="start"></wa-icon>
      Copy
    </wa-button>
    <wa-button size="small" appearance="outlined" variant="danger" (click)="onClear()" title="Clear all sections">
      <wa-icon name="trash" slot="start"></wa-icon>
      Clear
    </wa-button>
  </div>
  <textarea
    class="paste-area"
    placeholder="Paste text here, then press Enter to load..."
    (keydown)="onKeydown($event)"
  ></textarea>
  <input
    #fileInput
    type="file"
    accept=".json,application/json"
    (change)="onFileSelected($event)"
    style="display: none;"
  />
</div>
